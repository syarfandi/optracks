name: Update One Piece Episodes

on:
  schedule:
    - cron: '0 * * * 0,1,6' # Run every hour on Sun, Mon, Sat
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with: 
          node-version: '24'

      - name: Sync Episodes from Bilibili
        run: node src/scripts/sync_bilibili.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update episode database from Bilibili [skip ci]"
            git pull --rebase origin main
            git push
          fi
