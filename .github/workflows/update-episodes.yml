name: Update One Piece Episodes

on:
  schedule:
    - cron: '0 3,4 * * 1' # Monday 10:00 & 11:00 AM WIB (Exact Release Window)
    - cron: '0 8 * * 3,5' # Wednesday & Friday 15:00 WIB (Mid-week sweeps for late title updates)
    - cron: '0 */6 * * 0' # Every 6 hours on Sunday (Background Checks)
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with: 
          node-version: '24'

      - name: Sync Episodes from Bilibili
        run: node src/scripts/sync_bilibili.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update episode database from Bilibili [skip ci]"
            git pull --rebase origin main
            git push
          fi
