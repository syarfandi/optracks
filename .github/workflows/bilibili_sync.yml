name: Bilibili Episode Sync

on:
  schedule:
    - cron: '0 0 * * *' # Menjalankan setiap hari jam 00:00 UTC
  workflow_dispatch: # Memungkinkan menjalankan secara manual dari tab Actions di GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Menjamin GitHub Action memiliki izin untuk melakukan commit kembali ke repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Bilibili Sync Script
        run: node src/scripts/sync_bilibili.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Grand Line Bot"
          git config --global user.email "bot@grandlinetracker.com"
          git add public/data/*.json
          if git diff --staged --quiet; then
            echo "No new episodes to commit."
          else
            git commit -m "chore: auto-sync episodes from Bilibili [skip ci]"
            git push
            echo "New episodes pushed to the repository."
          fi
